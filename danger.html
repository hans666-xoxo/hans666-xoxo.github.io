<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <span>👑</span> HANS666 <span>👑</span>
            </div>
            <div class="nav">
                <a href="index.html">[HOME]</a>
                <a href="stats.html">[STATS]</a>

            </div>
        </div>

        <div class="status-bar">
            <span>> ZONE: <span class="blink" style="color:#ff0000">DANGER</span></span>
            <span>> TIME: <span id="time">23:59:47</span></span>
        </div>

        <div class="warning" style="animation: warningGlow 0.5s infinite;">
            ⚠️ ENTERING DANGER ZONE ⚠️

    <script>
        function updateTime() {
            const now = new Date();
            const timeString = now.getHours().toString().padStart(2, '0') + ':' +
                              now.getMinutes().toString().padStart(2, '0') + ':' +
                              now.getSeconds().toString().padStart(2, '0');
            document.getElementById('time').textContent = timeString;
        }
        setInterval(updateTime, 1000);
        updateTime();

        const dangerOutput = document.getElementById('dangerOutput');

        document.getElementById('nukeBtn').addEventListener('click', function() {
            dangerOutput.innerHTML = '> ⚠️ NUKE LAUNCH SEQUENCE INITIATED...<br>';

            dangerOutput.innerHTML += '> 5... 4... 3... 2... 1...<br>';
            dangerOutput.innerHTML += '> 💥 LAUNCHED (simulasi, jangan panik)';
        });

        document.getElementById('virusBtn').addEventListener('click', function() {
            dangerOutput.innerHTML = '> 🦠 DEPLOYING MALWARE...<br>';
            dangerOutput.innerHTML += '> BYPASSING ANTIVIRUS...<br>';
            dangerOutput.innerHTML += '> ACCESS GRANTED<br>';
            dangerOutput.innerHTML += '> SYSTEM INFECTED (simulasi)';
