<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>████▓▒░░░ HANS666 ░░░▒▓████</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="glitch-wrapper">
            <h1 class="glitch">HANS666</h1>
        </div>
        
        <div class="terminal">
            <p class="line"><span class="prompt">></span> ACCESSING CORE...</p>
            <p class="line"><span class="prompt">></span> IDENTITY: [REDACTED]</p>
            <p class="line"><span class="prompt">></span> STATUS: ████████</p>
            <p class="line"><span class="prompt">></span> LOCATION: TRACKING...</p>
            <p class="line"><span class="prompt">></span> INTEL: GATHERING...</p>
        </div>
        
        <div class="warning">
            <span class="blink">⚠️</span> UNAUTHORIZED ACCESS DETECTED <span class="blink">⚠️</span>
        </div>
        
        <div class="grid">
            <div class="grid-item">[DATA 1]</div>
            <div class="grid-item">[DATA 2]</div>
            <div class="grid-item">[DATA 3]</div>
            <div class="grid-item">[DATA 4]</div>
            <div class="grid-item">[DATA 5]</div>
            <div class="grid-item">[DATA 6]</div>
        </div>
        
        <button id="accessBtn">[ EXECUTE ]</button>
        
        <div class="footer">
            <p class="timestamp">> TIME: 2025.03.03_23:59</p>
            <p class="timestamp">> IP: [COLLECTING DATA...]</p>
            <p class="timestamp">> DEVICE: UNKNOWN</p>
        </div>
    </div>
    
    <script>
        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function generateMatrix() {
            const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン";
            let result = "";
            for (let i = 0; i < 3; i++) {
                result += chars[getRandomInt(0, chars.length - 1)];
            }
            return result;
        }

        document.getElementById('accessBtn').addEventListener('click', function() {
            this.style.transform = 'scale(0.95)';
            setTimeout(() => this.style.transform = 'scale(1)', 200);
            
            const randomCode = generateMatrix();
            alert(`ACCESS CODE: ${randomCode}\nLOGGED TO DATABASE.`);
        });
    </script>
</body>
</html>
